<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Globe Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { position: fixed; top: 0; left: 0; display: block; }
    #debug {
      position: fixed; bottom: 1rem; left: 1rem;
      font-family: monospace; font-size: 0.75rem;
      color: #0f0; background: rgba(0,0,0,0.6);
      padding: 0.5rem; border-radius: 4px;
      pointer-events: none; z-index: 10;
    }
    .back-link {
      position: fixed; top: 1rem; left: 1rem;
      color: #fff; text-decoration: none;
      font-family: monospace; font-size: 0.875rem;
      z-index: 100; opacity: 0.6;
    }
    .back-link:hover { opacity: 1; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.171.0",
      "three/addons/": "https://esm.sh/three@0.171.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <a href="/" class="back-link">&#8592; SW</a>
  <div id="debug">click the globe</div>
  <script type="module" src="./main.js"></script>
</body>
</html>
